
<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Memorial Cricket Club — Powered by Aditi Foundation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Work+Sans:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@600;700;900&family=Noto+Sans+Devanagari:wght@400;500;600&family=Great+Vibes&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b140f;
    --ink-2:#241b14;
    --clay:#a8402c;
    --clay-2:#8a3323;
    --gold:#cf9a3c;
    --gold-2:#e8bf6f;
    --pitch:#ece3cd;
    --paper:#f4efe2;
    --paper-dim:#e7dfc9;
    --leaf:#3c4a30;
    --leaf-2:#57683f;
    --ink-soft:rgba(27,20,15,0.72);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--paper);
    font-family:'Work Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  [data-lang="hi"] body, html[data-lang="hi"] body{font-family:'Noto Sans Devanagari',sans-serif;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  html[data-lang="hi"] h1, html[data-lang="hi"] h2, html[data-lang="hi"] h3, html[data-lang="hi"] .display{
    font-family:'Noto Serif Devanagari',serif;
  }
  .mono{font-family:'Space Mono',monospace;}
  .signature-font{font-family:'Great Vibes',cursive;}
  img{max-width:100%;display:block;}
  a{color:inherit;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
  @media(min-width:900px){.wrap{padding:0 48px;}}

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  /* ===== HEADER ===== */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding:14px 0;
    transition:background 0.4s ease, box-shadow 0.4s ease, padding 0.4s ease;
  }
  header.solid{
    background:rgba(27,20,15,0.92);
    backdrop-filter:blur(10px);
    box-shadow:0 2px 24px rgba(0,0,0,0.35);
    padding:10px 0;
  }
  .headrow{display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .brand img{height:42px;width:42px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
  .brand img.brand-img2{margin-left:2px;}
  .brand-text{line-height:1.05;}
  .brand-text .t1{font-family:'Fraunces',serif;font-weight:700;font-size:15px;color:var(--paper);letter-spacing:0.02em;}
  html[data-lang="hi"] .brand-text .t1{font-family:'Noto Serif Devanagari',serif;}
  .brand-text .t2{font-size:9.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold-2);}
  nav{display:none;gap:28px;font-size:13.5px;letter-spacing:0.04em;}
  nav a{text-decoration:none;color:var(--paper);opacity:0.85;position:relative;padding-bottom:4px;}
  nav a:hover{opacity:1;color:var(--gold-2);}
  @media(min-width:840px){nav{display:flex;}}
  .headright{display:flex;align-items:center;gap:14px;}
  .headr-dir{
    display:inline-flex;align-items:center;gap:6px;background:var(--clay);color:#fff;
    padding:7px 12px;border-radius:999px;text-decoration:none;font-size:11px;font-weight:600;
    letter-spacing:0.02em;white-space:nowrap;box-shadow:0 4px 12px rgba(168,64,44,0.35);
    transition:background 0.25s ease;
  }
  .headr-dir:hover{background:var(--clay-2);}
  .headr-dir span.txt{display:none;}
  @media(min-width:520px){.headr-dir span.txt{display:inline;}}
  .langtoggle{
    display:flex;align-items:center;background:rgba(244,239,226,0.08);
    border:1px solid rgba(207,154,60,0.5);border-radius:999px;padding:3px;cursor:pointer;
    font-size:12px;font-weight:600;user-select:none;
  }
  .langtoggle span{padding:5px 12px;border-radius:999px;transition:all 0.3s ease;}
  .langtoggle span.active{background:var(--gold);color:var(--ink);}
  .burger{display:flex;flex-direction:column;gap:4px;cursor:pointer;padding:6px;}
  .burger span{width:20px;height:2px;background:var(--paper);display:block;}
  @media(min-width:840px){.burger{display:none;}}
  .mobilenav{
    display:none;flex-direction:column;gap:2px;background:rgba(27,20,15,0.98);
    padding:10px 24px 18px;border-top:1px solid rgba(207,154,60,0.25);
  }
  .mobilenav.open{display:flex;}
  .mobilenav a{padding:10px 0;text-decoration:none;color:var(--paper);border-bottom:1px solid rgba(244,239,226,0.06);font-size:14px;}

  /* ===== HERO ===== */
  .hero{
    position:relative;min-height:100svh;display:flex;align-items:flex-end;
    background:#000;
  }
  .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center 62%;}
  .hero-slideshow{position:absolute;inset:0;overflow:hidden;}
  .hero-slide{
    position:absolute;inset:0;background-size:cover;background-position:center 60%;
    opacity:0;animation:heroFade 24s infinite;
  }
  .hero-slide:nth-child(1){animation-delay:0s;}
  .hero-slide:nth-child(2){animation-delay:6s;}
  .hero-slide:nth-child(3){animation-delay:12s;}
  .hero-slide:nth-child(4){animation-delay:18s;}
  @keyframes heroFade{
    0%{opacity:0;}
    4%{opacity:1;}
    22%{opacity:1;}
    28%{opacity:0;}
    100%{opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){
    .hero-slide{animation:none;opacity:0;}
    .hero-slide:nth-child(1){opacity:1;}
  }
  .hero-scrim{
    position:absolute;inset:0;
    background:
      linear-gradient(180deg, rgba(27,20,15,0.35) 0%, rgba(27,20,15,0.25) 35%, rgba(20,15,10,0.88) 92%),
      linear-gradient(90deg, rgba(20,15,10,0.55) 0%, rgba(20,15,10,0.05) 55%);
  }
  .hero-inner{position:relative;z-index:2;padding:140px 0 64px;width:100%;}
  .badge-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px;}
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(244,239,226,0.1);border:1px solid rgba(207,154,60,0.55);
    padding:7px 14px;border-radius:999px;font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase;
    backdrop-filter:blur(4px);color:var(--gold-2);
  }
  .hero h1{
    font-size:clamp(38px,7.5vw,84px);line-height:0.98;font-weight:800;margin:0 0 18px;color:var(--paper);
    text-shadow:0 4px 30px rgba(0,0,0,0.4);max-width:900px;
  }
  .hero h1 em{font-style:italic;color:var(--gold-2);font-weight:600;}
  .hero p.lede{font-size:clamp(15px,2vw,19px);max-width:560px;color:rgba(244,239,226,0.88);margin:0 0 30px;line-height:1.55;}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;padding:14px 26px;border-radius:3px;
    text-decoration:none;font-size:13.5px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
    transition:transform 0.25s ease, box-shadow 0.25s ease;border:none;cursor:pointer;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn-gold{background:var(--gold);color:var(--ink);box-shadow:0 8px 24px rgba(207,154,60,0.3);}
  .btn-ghost{background:transparent;color:var(--paper);border:1px solid rgba(244,239,226,0.5);}
  .scrolldown{
    position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:3;
    display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(244,239,226,0.7);font-size:10px;
    letter-spacing:0.2em;text-transform:uppercase;
  }
  .scrolldown .line{width:1px;height:34px;background:linear-gradient(180deg,var(--gold-2),transparent);animation:scrolldn 2s infinite;}
  @keyframes scrolldn{0%{opacity:0;transform:translateY(-6px);}50%{opacity:1;}100%{opacity:0;transform:translateY(10px);}}

  /* ===== SECTION SHELL ===== */
  section{position:relative;padding:88px 0;}
  .eyebrow{
    display:flex;align-items:center;gap:12px;margin-bottom:14px;color:var(--gold-2);
    font-size:12px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;
  }
  .eyebrow::before{content:"";width:28px;height:1px;background:var(--gold-2);}
  .sec-title{font-size:clamp(28px,4.2vw,46px);font-weight:700;margin:0 0 12px;color:var(--paper);}
  .sec-sub{max-width:600px;color:rgba(244,239,226,0.7);font-size:15.5px;line-height:1.6;margin-bottom:48px;}
  .paper-section{background:var(--paper);color:var(--ink);}
  .paper-section .eyebrow{color:var(--clay);}
  .paper-section .eyebrow::before{background:var(--clay);}
  .paper-section .sec-title{color:var(--ink);}
  .paper-section .sec-sub{color:var(--ink-soft);}

  /* reveal-on-scroll */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.8s ease, transform 0.8s ease;}
  .reveal.show{opacity:1;transform:translateY(0);}

  /* ===== NOTICE ===== */
  .notice-board{
    max-width:480px;margin:0 auto;background:#fff;padding:14px 14px 20px;
    box-shadow:0 18px 40px rgba(27,20,15,0.22), 0 2px 6px rgba(27,20,15,0.15);
    cursor:pointer;transition:transform 0.3s ease, box-shadow 0.3s ease;
  }
  .notice-board:hover{transform:translateY(-6px);box-shadow:0 26px 50px rgba(27,20,15,0.3);}
  .notice-board img{width:100%;display:block;}

  /* ===== SCRAPBOOK / PRESS ===== */
  .press-strip{
    display:flex;gap:22px;overflow-x:auto;padding:20px 6px 30px;scroll-snap-type:x proximity;
    -webkit-overflow-scrolling:touch;
  }
  .press-strip::-webkit-scrollbar{height:6px;}
  .press-strip::-webkit-scrollbar-thumb{background:rgba(27,20,15,0.25);border-radius:10px;}
  .clip-card{
    flex:0 0 auto;width:230px;scroll-snap-align:start;background:#fff;padding:10px 10px 16px;
    box-shadow:0 14px 30px rgba(27,20,15,0.22), 0 2px 6px rgba(27,20,15,0.15);
    cursor:pointer;transition:transform 0.3s ease, box-shadow 0.3s ease;position:relative;
  }
  .clip-card:nth-child(odd){transform:rotate(-2.2deg);}
  .clip-card:nth-child(even){transform:rotate(1.8deg);}
  .clip-card:hover{transform:rotate(0deg) translateY(-6px) scale(1.02);box-shadow:0 22px 40px rgba(27,20,15,0.3);z-index:5;}
  .clip-card img{width:100%;height:290px;object-fit:cover;object-position:top;filter:sepia(0.06) contrast(1.03);}
  .clip-tape{
    position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-3deg);
    width:70px;height:22px;background:rgba(207,154,60,0.55);
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  .clip-cap{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.4;font-weight:600;}
  .clip-date{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--clay);text-transform:uppercase;letter-spacing:0.06em;}

  /* lightbox */
  .lightbox{
    position:fixed;inset:0;background:rgba(10,7,5,0.94);z-index:200;
    display:none;align-items:center;justify-content:center;padding:30px;
  }
  .lightbox.open{display:flex;}
  .lightbox img{max-height:88vh;max-width:92vw;box-shadow:0 30px 80px rgba(0,0,0,0.6);}
  .lightbox-close{
    position:absolute;top:20px;right:26px;color:var(--paper);font-size:30px;cursor:pointer;
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  }

  /* ===== STATS SCOREBOARD ===== */
  .scoreboard{
    background:linear-gradient(180deg,#151009,#1f170f);
    border:1px solid rgba(207,154,60,0.25);border-radius:6px;
    display:grid;grid-template-columns:repeat(2,1fr);
  }
  @media(min-width:760px){.scoreboard{grid-template-columns:repeat(4,1fr);}}
  .stat-cell{padding:34px 22px;text-align:center;border-right:1px solid rgba(207,154,60,0.15);border-bottom:1px solid rgba(207,154,60,0.15);}
  .stat-cell:nth-child(2n){border-right:none;}
  @media(min-width:760px){.stat-cell{border-bottom:none;}.stat-cell:nth-child(2n){border-right:1px solid rgba(207,154,60,0.15);}.stat-cell:last-child{border-right:none;}}
  .stat-num{font-family:'Space Mono',monospace;font-size:clamp(30px,5vw,46px);font-weight:700;color:var(--gold-2);letter-spacing:-0.02em;}
  .stat-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(244,239,226,0.6);margin-top:8px;}

  /* ===== INAUGURATION GALLERY ===== */
  .igrid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
  @media(min-width:700px){.igrid{grid-template-columns:repeat(3,1fr);}}
  .igrid figure{margin:0;position:relative;overflow:hidden;border-radius:4px;aspect-ratio:4/5;background:#20180f;}
  .igrid img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;}
  .igrid figure:hover img{transform:scale(1.08);}
  .igrid figcaption{
    position:absolute;left:0;right:0;bottom:0;padding:14px 14px 12px;
    background:linear-gradient(0deg,rgba(0,0,0,0.85),transparent);
    font-size:12.5px;color:var(--paper);
  }
  .igrid figcaption .yr{font-family:'Space Mono',monospace;color:var(--gold-2);font-size:11px;}

  /* ===== PRESIDENT ===== */
  .president{
    display:grid;grid-template-columns:1fr;gap:44px;align-items:center;
    background:linear-gradient(135deg,rgba(207,154,60,0.07),rgba(168,64,44,0.05));
    border:1px solid rgba(207,154,60,0.22);border-radius:10px;padding:36px;
    backdrop-filter:blur(6px);
  }
  @media(min-width:860px){.president{grid-template-columns:0.8fr 1.2fr;padding:52px;}}
  .pres-photo-wrap{position:relative;}
  .pres-photo{
    border-radius:8px;overflow:hidden;border:1px solid rgba(207,154,60,0.5);
    box-shadow:0 24px 60px rgba(0,0,0,0.45);
  }
  .pres-photo img{width:100%;aspect-ratio:3/4;object-fit:cover;transition:transform 0.6s ease;}
  .pres-photo:hover img{transform:scale(1.06);}
  .pres-badge{
    position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:var(--ink);padding:9px 20px;border-radius:999px;
    font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
  }
  .pres-body p{color:rgba(244,239,226,0.85);line-height:1.75;font-size:15.5px;margin:0 0 18px;}
  .pres-sig{text-align:right;margin-top:22px;}
  .pres-sig .name{font-family:'Great Vibes',cursive;font-size:38px;color:var(--gold-2);}
  .pres-sig .role{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(244,239,226,0.55);margin-top:-6px;}

  /* ===== CHAMPIONSHIP HISTORY ===== */
  .hist-wrap{border:1px solid var(--leaf);border-radius:6px;overflow:hidden;background:#0f1a08;}
  .hist-head{
    display:grid;grid-template-columns:70px 1fr 1fr;gap:10px;padding:14px 18px;
    background:#0a1305;font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--gold-2);
    font-family:'Space Mono',monospace;
  }
  @media(min-width:760px){.hist-head{grid-template-columns:70px 1.1fr 1fr 1.4fr 1.2fr 1fr;}}
  .hist-row{
    display:grid;grid-template-columns:70px 1fr 1fr;gap:10px;padding:16px 18px;
    border-top:1px solid rgba(207,154,60,0.12);font-size:13px;color:var(--pitch);align-items:center;
  }
  @media(min-width:760px){.hist-row{grid-template-columns:70px 1.1fr 1fr 1.4fr 1.2fr 1fr;}}
  .hist-row .season{font-family:'Space Mono',monospace;color:var(--gold-2);font-weight:700;}
  .hist-row .win{font-weight:700;color:#fff;}
  .hist-cell-label{display:block;font-size:9px;text-transform:uppercase;color:rgba(236,227,205,0.4);letter-spacing:0.08em;margin-bottom:2px;}
  @media(min-width:760px){.hist-cell-label{display:none;}}
  .hist-row.featured{background:rgba(207,154,60,0.08);}
  .gap{color:rgba(236,227,205,0.35);font-style:italic;}

  /* ===== CHIEF GUESTS ===== */
  .guest-strip{display:flex;gap:20px;overflow-x:auto;padding:8px 4px 20px;}
  .guest-card{
    flex:0 0 auto;width:200px;background:var(--paper);border-radius:6px;overflow:hidden;color:var(--ink);
    box-shadow:0 14px 30px rgba(0,0,0,0.25);
  }
  .guest-card img{width:100%;height:150px;object-fit:cover;}
  .guest-card .gc-body{padding:14px 14px 18px;}
  .guest-card .gc-name{font-family:'Fraunces',serif;font-weight:700;font-size:15px;}
  html[data-lang="hi"] .guest-card .gc-name{font-family:'Noto Serif Devanagari',serif;}
  .guest-card .gc-role{font-size:11px;color:var(--clay);margin-top:2px;}
  .guest-card .gc-note{font-size:11.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}

  /* ===== GROUND GALLERY ===== */
  .ground-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:640px){.ground-grid{grid-template-columns:repeat(2,1fr);}}
  @media(min-width:960px){.ground-grid{grid-template-columns:repeat(3,1fr);}}
  .ground-grid figure{margin:0;position:relative;overflow:hidden;border-radius:8px;cursor:pointer;box-shadow:0 8px 20px rgba(27,20,15,0.12);}
  .ground-grid img{width:100%;height:230px;object-fit:cover;display:block;transition:transform 0.5s ease;}
  .ground-grid figure:hover img{transform:scale(1.06);}
  .ground-grid figcaption{position:absolute;left:0;right:0;bottom:0;padding:10px 12px;font-size:12px;color:#fff;
    background:linear-gradient(0deg,rgba(0,0,0,0.65),rgba(0,0,0,0));}

  /* ===== LOCATION ===== */
  .loc-box{
    display:grid;grid-template-columns:1fr;gap:0;border:1px solid rgba(207,154,60,0.25);border-radius:8px;overflow:hidden;
  }
  @media(min-width:800px){.loc-box{grid-template-columns:1fr 1fr;}}
  .loc-map{position:relative;min-height:280px;background:#20180f;}
  .loc-map iframe{width:100%;height:100%;min-height:280px;border:0;filter:grayscale(0.3) sepia(0.15);}
  .loc-info{padding:34px;background:rgba(207,154,60,0.05);}
  .loc-info .addr{font-size:15px;line-height:1.7;color:rgba(244,239,226,0.85);margin-bottom:22px;}
  .pin-btn{
    display:inline-flex;align-items:center;gap:10px;background:var(--clay);color:#fff;
    padding:14px 22px;border-radius:4px;text-decoration:none;font-size:13.5px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.04em;box-shadow:0 10px 26px rgba(168,64,44,0.35);
  }

  /* ===== SPONSORS ===== */
  .sponsor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(min-width:700px){.sponsor-grid{grid-template-columns:repeat(4,1fr);}}
  .sponsor-tile{
    background:rgba(244,239,226,0.05);border:1px dashed rgba(207,154,60,0.35);border-radius:6px;
    padding:26px 16px;text-align:center;font-size:12.5px;color:rgba(244,239,226,0.6);min-height:88px;
    display:flex;align-items:center;justify-content:center;
  }

  /* ===== FOOTER ===== */
  footer{background:#120d09;padding:64px 0 28px;border-top:1px solid rgba(207,154,60,0.18);}
  .foot-grid{display:grid;grid-template-columns:1fr;gap:36px;margin-bottom:46px;}
  @media(min-width:800px){.foot-grid{grid-template-columns:1.3fr 1fr 1fr;}}
  .foot-brand{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .foot-brand img{height:52px;width:52px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;}
  .foot-col h4{font-size:11.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold-2);margin:0 0 16px;}
  .foot-col p, .foot-col a{font-size:13.5px;color:rgba(244,239,226,0.65);line-height:1.9;text-decoration:none;display:block;}
  .foot-bottom{
    display:flex;flex-direction:column;gap:18px;align-items:flex-start;padding-top:26px;
    border-top:1px solid rgba(207,154,60,0.12);
  }
  @media(min-width:760px){.foot-bottom{flex-direction:row;justify-content:space-between;align-items:center;}}
  .foot-sig .name{font-family:'Great Vibes',cursive;font-size:26px;color:var(--gold-2);}
  .foot-copy{font-size:11.5px;color:rgba(244,239,226,0.4);}

  ::selection{background:var(--gold);color:var(--ink);}
  :focus-visible{outline:2px solid var(--gold-2);outline-offset:3px;}

  /* ===== OUR STORY (timeline) ===== */
  .timeline{position:relative;padding-left:28px;border-left:2px solid rgba(207,154,60,0.3);}
  .tl-item{position:relative;padding-bottom:36px;}
  .tl-item:last-child{padding-bottom:0;}
  .tl-item::before{
    content:"";position:absolute;left:-34px;top:2px;width:12px;height:12px;border-radius:50%;
    background:var(--gold);box-shadow:0 0 0 4px rgba(207,154,60,0.18);
  }
  .tl-item .tl-year{font-family:'Space Mono',monospace;font-size:12px;color:var(--gold-2);letter-spacing:0.06em;}
  .tl-item h4{margin:4px 0 6px;font-size:17px;font-family:'Fraunces',serif;color:var(--paper);}
  html[data-lang="hi"] .tl-item h4{font-family:'Noto Serif Devanagari',serif;}
  .tl-item p{margin:0;font-size:14px;color:rgba(244,239,226,0.72);line-height:1.6;max-width:560px;}

  /* ===== FORMAT FACTS ===== */
  .format-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(min-width:760px){.format-grid{grid-template-columns:repeat(4,1fr);}}
  .format-card{
    background:#fff;border-radius:6px;padding:26px 20px;box-shadow:0 10px 26px rgba(27,20,15,0.1);
    border-top:3px solid var(--clay);
  }
  .format-card .ficon{font-size:24px;margin-bottom:10px;}
  .format-card .flabel{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--clay);font-weight:700;margin-bottom:4px;}
  .format-card .fval{font-family:'Fraunces',serif;font-weight:700;font-size:17px;color:var(--ink);}
  html[data-lang="hi"] .format-card .fval{font-family:'Noto Serif Devanagari',serif;}

  /* ===== HIGHLIGHTS ===== */
  .highlight-box{
    display:grid;grid-template-columns:1fr;gap:26px;align-items:center;
    background:linear-gradient(135deg,rgba(207,154,60,0.08),rgba(60,74,48,0.12));
    border:1px solid rgba(207,154,60,0.25);border-radius:10px;padding:36px;
  }
  @media(min-width:760px){.highlight-box{grid-template-columns:1fr 1fr;}}
  .yt-frame{
    position:relative;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#0a0a0a;
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(207,154,60,0.3);
  }
  .yt-frame .playbtn{
    width:64px;height:64px;border-radius:50%;background:var(--clay);display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:22px;box-shadow:0 10px 30px rgba(168,64,44,0.5);
  }
  .yt-frame::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.4));}

  /* ===== COMMITTEE ===== */
  .committee-grid{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:700px){.committee-grid{grid-template-columns:repeat(3,1fr);}}
  .committee-card{
    background:rgba(244,239,226,0.05);border:1px solid rgba(207,154,60,0.2);border-radius:8px;
    padding:24px;text-align:center;
  }
  .committee-card .cavatar{
    width:60px;height:60px;border-radius:50%;margin:0 auto 14px;
    background:linear-gradient(135deg,var(--gold),var(--clay));display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:700;font-size:20px;color:#fff;
  }
  .committee-card h4{margin:0 0 4px;font-size:15.5px;color:var(--paper);font-family:'Fraunces',serif;}
  html[data-lang="hi"] .committee-card h4{font-family:'Noto Serif Devanagari',serif;}
  .committee-card .crole{font-size:11.5px;color:var(--gold-2);text-transform:uppercase;letter-spacing:0.06em;}

  /* ===== REGISTER CTA ===== */
  .register-banner{
    background:linear-gradient(120deg,var(--clay),var(--clay-2));border-radius:12px;padding:48px 36px;
    text-align:center;position:relative;overflow:hidden;
  }
  .register-banner::before{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 24px);
  }
  .register-banner h2{position:relative;color:#fff;margin:0 0 12px;font-size:clamp(24px,4vw,36px);}
  .register-banner p{position:relative;color:rgba(255,255,255,0.85);max-width:520px;margin:0 auto 26px;font-size:15px;}
  .register-ctas{position:relative;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .btn-white{background:#fff;color:var(--clay-2);}
  .btn-outline-white{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.6);}

  /* ===== FAQ ===== */
  .faq-item{border-bottom:1px solid rgba(207,154,60,0.18);}
  .faq-q{
    display:flex;justify-content:space-between;align-items:center;padding:20px 4px;cursor:pointer;
    font-size:15.5px;font-weight:600;color:var(--paper);gap:16px;
  }
  .faq-q .plus{font-family:'Space Mono',monospace;font-size:20px;color:var(--gold-2);transition:transform 0.3s ease;flex-shrink:0;}
  .faq-item.open .plus{transform:rotate(45deg);}
  .faq-a{max-height:0;overflow:hidden;transition:max-height 0.35s ease;}
  .faq-item.open .faq-a{max-height:220px;}
  .faq-a p{padding:0 4px 20px;margin:0;color:rgba(244,239,226,0.7);font-size:14px;line-height:1.65;max-width:640px;}

  /* ===== COMMITTEE MEMBERS ROSTER (empty slots) ===== */
  .roster-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(min-width:640px){.roster-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:900px){.roster-grid{grid-template-columns:repeat(4,1fr);}}
  .roster-card{
    background:rgba(244,239,226,0.04);border:1px solid rgba(207,154,60,0.18);border-radius:8px;
    padding:20px 16px;text-align:center;
  }
  .roster-photo{
    width:76px;height:76px;border-radius:50%;margin:0 auto 12px;overflow:hidden;
    border:2px solid rgba(207,154,60,0.4);background:rgba(207,154,60,0.08);
    display:flex;align-items:center;justify-content:center;
  }
  .roster-photo img{width:100%;height:100%;object-fit:cover;}
  .roster-name{font-family:'Fraunces',serif;font-weight:700;font-size:14.5px;color:var(--paper);}
  html[data-lang="hi"] .roster-name{font-family:'Noto Serif Devanagari',serif;}
  .roster-role{font-size:11px;color:var(--gold-2);text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}
  .roster-sub{font-size:11px;color:rgba(244,239,226,0.55);margin-top:6px;line-height:1.4;}
  .roster-link{display:inline-block;margin-top:8px;font-size:11px;color:var(--gold-2);text-decoration:underline;}
  .roster-card.empty{border-style:dashed;}
  .roster-card.empty .roster-photo{color:rgba(244,239,226,0.35);font-size:26px;}
  .roster-card.empty .roster-name{color:rgba(244,239,226,0.4);font-weight:600;}
  .roster-card.empty .roster-role{color:rgba(244,239,226,0.3);}
</style>
</head>

  [data-lang="hi"] body, html[data-lang="hi"] body{font-family:'Noto Sans Devanagari',sans-serif;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  html[data-lang="hi"] h1, html[data-lang="hi"] h2, html[data-lang="hi"] h3, html[data-lang="hi"] .display{
    font-family:'Noto Serif Devanagari',serif;
  }
  .mono{font-family:'Space Mono',monospace;}
  .signature-font{font-family:'Great Vibes',cursive;}
  img{max-width:100%;display:block;}
  a{color:inherit;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
  @media(min-width:900px){.wrap{padding:0 48px;}}

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  /* ===== HEADER ===== */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding:14px 0;
    transition:background 0.4s ease, box-shadow 0.4s ease, padding 0.4s ease;
  }
  header.solid{
    background:rgba(27,20,15,0.92);
    backdrop-filter:blur(10px);
    box-shadow:0 2px 24px rgba(0,0,0,0.35);
    padding:10px 0;
  }
  .headrow{display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .brand img{height:42px;width:42px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
  .brand img.brand-img2{margin-left:2px;}
  .brand-text{line-height:1.05;}
  .brand-text .t1{font-family:'Fraunces',serif;font-weight:700;font-size:15px;color:var(--paper);letter-spacing:0.02em;}
  html[data-lang="hi"] .brand-text .t1{font-family:'Noto Serif Devanagari',serif;}
  .brand-text .t2{font-size:9.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold-2);}
  nav{display:none;gap:28px;font-size:13.5px;letter-spacing:0.04em;}
  nav a{text-decoration:none;color:var(--paper);opacity:0.85;position:relative;padding-bottom:4px;}
  nav a:hover{opacity:1;color:var(--gold-2);}
  @media(min-width:840px){nav{display:flex;}}
  .headright{display:flex;align-items:center;gap:14px;}
  .headr-dir{
    display:inline-flex;align-items:center;gap:6px;background:var(--clay);color:#fff;
    padding:7px 12px;border-radius:999px;text-decoration:none;font-size:11px;font-weight:600;
    letter-spacing:0.02em;white-space:nowrap;box-shadow:0 4px 12px rgba(168,64,44,0.35);
    transition:background 0.25s ease;
  }
  .headr-dir:hover{background:var(--clay-2);}
  .headr-dir span.txt{display:none;}
  @media(min-width:520px){.headr-dir span.txt{display:inline;}}
  .langtoggle{
    display:flex;align-items:center;background:rgba(244,239,226,0.08);
    border:1px solid rgba(207,154,60,0.5);border-radius:999px;padding:3px;cursor:pointer;
    font-size:12px;font-weight:600;user-select:none;
  }
  .langtoggle span{padding:5px 12px;border-radius:999px;transition:all 0.3s ease;}
  .langtoggle span.active{background:var(--gold);color:var(--ink);}
  .burger{display:flex;flex-direction:column;gap:4px;cursor:pointer;padding:6px;}
  .burger span{width:20px;height:2px;background:var(--paper);display:block;}
  @media(min-width:840px){.burger{display:none;}}
  .mobilenav{
    display:none;flex-direction:column;gap:2px;background:rgba(27,20,15,0.98);
    padding:10px 24px 18px;border-top:1px solid rgba(207,154,60,0.25);
  }
  .mobilenav.open{display:flex;}
  .mobilenav a{padding:10px 0;text-decoration:none;color:var(--paper);border-bottom:1px solid rgba(244,239,226,0.06);font-size:14px;}

  /* ===== HERO ===== */
  .hero{
    position:relative;min-height:100svh;display:flex;align-items:flex-end;
    background:#000;
  }
  .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center 62%;}
  .hero-slideshow{position:absolute;inset:0;overflow:hidden;}
  .hero-slide{
    position:absolute;inset:0;background-size:cover;background-position:center 60%;
    opacity:0;animation:heroFade 24s infinite;
  }
  .hero-slide:nth-child(1){animation-delay:0s;}
  .hero-slide:nth-child(2){animation-delay:6s;}
  .hero-slide:nth-child(3){animation-delay:12s;}
  .hero-slide:nth-child(4){animation-delay:18s;}
  @keyframes heroFade{
    0%{opacity:0;}
    4%{opacity:1;}
    22%{opacity:1;}
    28%{opacity:0;}
    100%{opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){
    .hero-slide{animation:none;opacity:0;}
    .hero-slide:nth-child(1){opacity:1;}
  }
  .hero-scrim{
    position:absolute;inset:0;
    background:
      linear-gradient(180deg, rgba(27,20,15,0.35) 0%, rgba(27,20,15,0.25) 35%, rgba(20,15,10,0.88) 92%),
      linear-gradient(90deg, rgba(20,15,10,0.55) 0%, rgba(20,15,10,0.05) 55%);
  }
  .hero-inner{position:relative;z-index:2;padding:140px 0 64px;width:100%;}
  .badge-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px;}
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(244,239,226,0.1);border:1px solid rgba(207,154,60,0.55);
    padding:7px 14px;border-radius:999px;font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase;
    backdrop-filter:blur(4px);color:var(--gold-2);
  }
  .hero h1{
    font-size:clamp(38px,7.5vw,84px);line-height:0.98;font-weight:800;margin:0 0 18px;color:var(--paper);
    text-shadow:0 4px 30px rgba(0,0,0,0.4);max-width:900px;
  }
  .hero h1 em{font-style:italic;color:var(--gold-2);font-weight:600;}
  .hero p.lede{font-size:clamp(15px,2vw,19px);max-width:560px;color:rgba(244,239,226,0.88);margin:0 0 30px;line-height:1.55;}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;padding:14px 26px;border-radius:3px;
    text-decoration:none;font-size:13.5px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
    transition:transform 0.25s ease, box-shadow 0.25s ease;border:none;cursor:pointer;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn-gold{background:var(--gold);color:var(--ink);box-shadow:0 8px 24px rgba(207,154,60,0.3);}
  .btn-ghost{background:transparent;color:var(--paper);border:1px solid rgba(244,239,226,0.5);}
  .scrolldown{
    position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:3;
    display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(244,239,226,0.7);font-size:10px;
    letter-spacing:0.2em;text-transform:uppercase;
  }
  .scrolldown .line{width:1px;height:34px;background:linear-gradient(180deg,var(--gold-2),transparent);animation:scrolldn 2s infinite;}
  @keyframes scrolldn{0%{opacity:0;transform:translateY(-6px);}50%{opacity:1;}100%{opacity:0;transform:translateY(10px);}}

  /* ===== SECTION SHELL ===== */
  section{position:relative;padding:88px 0;}
  .eyebrow{
    display:flex;align-items:center;gap:12px;margin-bottom:14px;color:var(--gold-2);
    font-size:12px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;
  }
  .eyebrow::before{content:"";width:28px;height:1px;background:var(--gold-2);}
  .sec-title{font-size:clamp(28px,4.2vw,46px);font-weight:700;margin:0 0 12px;color:var(--paper);}
  .sec-sub{max-width:600px;color:rgba(244,239,226,0.7);font-size:15.5px;line-height:1.6;margin-bottom:48px;}
  .paper-section{background:var(--paper);color:var(--ink);}
  .paper-section .eyebrow{color:var(--clay);}
  .paper-section .eyebrow::before{background:var(--clay);}
  .paper-section .sec-title{color:var(--ink);}
  .paper-section .sec-sub{color:var(--ink-soft);}

  /* reveal-on-scroll */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.8s ease, transform 0.8s ease;}
  .reveal.show{opacity:1;transform:translateY(0);}

  /* ===== NOTICE ===== */
  .notice-board{
    max-width:480px;margin:0 auto;background:#fff;padding:14px 14px 20px;
    box-shadow:0 18px 40px rgba(27,20,15,0.22), 0 2px 6px rgba(27,20,15,0.15);
    cursor:pointer;transition:transform 0.3s ease, box-shadow 0.3s ease;
  }
  .notice-board:hover{transform:translateY(-6px);box-shadow:0 26px 50px rgba(27,20,15,0.3);}
  .notice-board img{width:100%;display:block;}

  /* ===== SCRAPBOOK / PRESS ===== */
  .press-strip{
    display:flex;gap:22px;overflow-x:auto;padding:20px 6px 30px;scroll-snap-type:x proximity;
    -webkit-overflow-scrolling:touch;
  }
  .press-strip::-webkit-scrollbar{height:6px;}
  .press-strip::-webkit-scrollbar-thumb{background:rgba(27,20,15,0.25);border-radius:10px;}
  .clip-card{
    flex:0 0 auto;width:230px;scroll-snap-align:start;background:#fff;padding:10px 10px 16px;
    box-shadow:0 14px 30px rgba(27,20,15,0.22), 0 2px 6px rgba(27,20,15,0.15);
    cursor:pointer;transition:transform 0.3s ease, box-shadow 0.3s ease;position:relative;
  }
  .clip-card:nth-child(odd){transform:rotate(-2.2deg);}
  .clip-card:nth-child(even){transform:rotate(1.8deg);}
  .clip-card:hover{transform:rotate(0deg) translateY(-6px) scale(1.02);box-shadow:0 22px 40px rgba(27,20,15,0.3);z-index:5;}
  .clip-card img{width:100%;height:290px;object-fit:cover;object-position:top;filter:sepia(0.06) contrast(1.03);}
  .clip-tape{
    position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-3deg);
    width:70px;height:22px;background:rgba(207,154,60,0.55);
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  .clip-cap{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.4;font-weight:600;}
  .clip-date{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--clay);text-transform:uppercase;letter-spacing:0.06em;}

  /* lightbox */
  .lightbox{
    position:fixed;inset:0;background:rgba(10,7,5,0.94);z-index:200;
    display:none;align-items:center;justify-content:center;padding:30px;
  }
  .lightbox.open{display:flex;}
  .lightbox img{max-height:88vh;max-width:92vw;box-shadow:0 30px 80px rgba(0,0,0,0.6);}
  .lightbox-close{
    position:absolute;top:20px;right:26px;color:var(--paper);font-size:30px;cursor:pointer;
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  }

  /* ===== STATS SCOREBOARD ===== */
  .scoreboard{
    background:linear-gradient(180deg,#151009,#1f170f);
    border:1px solid rgba(207,154,60,0.25);border-radius:6px;
    display:grid;grid-template-columns:repeat(2,1fr);
  }
  @media(min-width:760px){.scoreboard{grid-template-columns:repeat(4,1fr);}}
  .stat-cell{padding:34px 22px;text-align:center;border-right:1px solid rgba(207,154,60,0.15);border-bottom:1px solid rgba(207,154,60,0.15);}
  .stat-cell:nth-child(2n){border-right:none;}
  @media(min-width:760px){.stat-cell{border-bottom:none;}.stat-cell:nth-child(2n){border-right:1px solid rgba(207,154,60,0.15);}.stat-cell:last-child{border-right:none;}}
  .stat-num{font-family:'Space Mono',monospace;font-size:clamp(30px,5vw,46px);font-weight:700;color:var(--gold-2);letter-spacing:-0.02em;}
  .stat-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(244,239,226,0.6);margin-top:8px;}

  /* ===== INAUGURATION GALLERY ===== */
  .igrid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
  @media(min-width:700px){.igrid{grid-template-columns:repeat(3,1fr);}}
  .igrid figure{margin:0;position:relative;overflow:hidden;border-radius:4px;aspect-ratio:4/5;background:#20180f;}
  .igrid img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;}
  .igrid figure:hover img{transform:scale(1.08);}
  .igrid figcaption{
    position:absolute;left:0;right:0;bottom:0;padding:14px 14px 12px;
    background:linear-gradient(0deg,rgba(0,0,0,0.85),transparent);
    font-size:12.5px;color:var(--paper);
  }
  .igrid figcaption .yr{font-family:'Space Mono',monospace;color:var(--gold-2);font-size:11px;}

  /* ===== PRESIDENT ===== */
  .president{
    display:grid;grid-template-columns:1fr;gap:44px;align-items:center;
    background:linear-gradient(135deg,rgba(207,154,60,0.07),rgba(168,64,44,0.05));
    border:1px solid rgba(207,154,60,0.22);border-radius:10px;padding:36px;
    backdrop-filter:blur(6px);
  }
  @media(min-width:860px){.president{grid-template-columns:0.8fr 1.2fr;padding:52px;}}
  .pres-photo-wrap{position:relative;}
  .pres-photo{
    border-radius:8px;overflow:hidden;border:1px solid rgba(207,154,60,0.5);
    box-shadow:0 24px 60px rgba(0,0,0,0.45);
  }
  .pres-photo img{width:100%;aspect-ratio:3/4;object-fit:cover;transition:transform 0.6s ease;}
  .pres-photo:hover img{transform:scale(1.06);}
  .pres-badge{
    position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:var(--ink);padding:9px 20px;border-radius:999px;
    font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
  }
  .pres-body p{color:rgba(244,239,226,0.85);line-height:1.75;font-size:15.5px;margin:0 0 18px;}
  .pres-sig{text-align:right;margin-top:22px;}
  .pres-sig .name{font-family:'Great Vibes',cursive;font-size:38px;color:var(--gold-2);}
  .pres-sig .role{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(244,239,226,0.55);margin-top:-6px;}

  /* ===== CHAMPIONSHIP HISTORY ===== */
  .hist-wrap{border:1px solid var(--leaf);border-radius:6px;overflow:hidden;background:#0f1a08;}
  .hist-head{
    display:grid;grid-template-columns:70px 1fr 1fr;gap:10px;padding:14px 18px;
    background:#0a1305;font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--gold-2);
    font-family:'Space Mono',monospace;
  }
  @media(min-width:760px){.hist-head{grid-template-columns:70px 1.1fr 1fr 1.4fr 1.2fr 1fr;}}
  .hist-row{
    display:grid;grid-template-columns:70px 1fr 1fr;gap:10px;padding:16px 18px;
    border-top:1px solid rgba(207,154,60,0.12);font-size:13px;color:var(--pitch);align-items:center;
  }
  @media(min-width:760px){.hist-row{grid-template-columns:70px 1.1fr 1fr 1.4fr 1.2fr 1fr;}}
  .hist-row .season{font-family:'Space Mono',monospace;color:var(--gold-2);font-weight:700;}
  .hist-row .win{font-weight:700;color:#fff;}
  .hist-cell-label{display:block;font-size:9px;text-transform:uppercase;color:rgba(236,227,205,0.4);letter-spacing:0.08em;margin-bottom:2px;}
  @media(min-width:760px){.hist-cell-label{display:none;}}
  .hist-row.featured{background:rgba(207,154,60,0.08);}
  .gap{color:rgba(236,227,205,0.35);font-style:italic;}

  /* ===== CHIEF GUESTS ===== */
  .guest-strip{display:flex;gap:20px;overflow-x:auto;padding:8px 4px 20px;}
  .guest-card{
    flex:0 0 auto;width:200px;background:var(--paper);border-radius:6px;overflow:hidden;color:var(--ink);
    box-shadow:0 14px 30px rgba(0,0,0,0.25);
  }
  .guest-card img{width:100%;height:150px;object-fit:cover;}
  .guest-card .gc-body{padding:14px 14px 18px;}
  .guest-card .gc-name{font-family:'Fraunces',serif;font-weight:700;font-size:15px;}
  html[data-lang="hi"] .guest-card .gc-name{font-family:'Noto Serif Devanagari',serif;}
  .guest-card .gc-role{font-size:11px;color:var(--clay);margin-top:2px;}
  .guest-card .gc-note{font-size:11.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}

  /* ===== GROUND GALLERY ===== */
  .ground-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:640px){.ground-grid{grid-template-columns:repeat(2,1fr);}}
  @media(min-width:960px){.ground-grid{grid-template-columns:repeat(3,1fr);}}
  .ground-grid figure{margin:0;position:relative;overflow:hidden;border-radius:8px;cursor:pointer;box-shadow:0 8px 20px rgba(27,20,15,0.12);}
  .ground-grid img{width:100%;height:230px;object-fit:cover;display:block;transition:transform 0.5s ease;}
  .ground-grid figure:hover img{transform:scale(1.06);}
  .ground-grid figcaption{position:absolute;left:0;right:0;bottom:0;padding:10px 12px;font-size:12px;color:#fff;
    background:linear-gradient(0deg,rgba(0,0,0,0.65),rgba(0,0,0,0));}

  /* ===== LOCATION ===== */
  .loc-box{
    display:grid;grid-template-columns:1fr;gap:0;border:1px solid rgba(207,154,60,0.25);border-radius:8px;overflow:hidden;
  }
  @media(min-width:800px){.loc-box{grid-template-columns:1fr 1fr;}}
  .loc-map{position:relative;min-height:280px;background:#20180f;}
  .loc-map iframe{width:100%;height:100%;min-height:280px;border:0;filter:grayscale(0.3) sepia(0.15);}
  .loc-info{padding:34px;background:rgba(207,154,60,0.05);}
  .loc-info .addr{font-size:15px;line-height:1.7;color:rgba(244,239,226,0.85);margin-bottom:22px;}
  .pin-btn{
    display:inline-flex;align-items:center;gap:10px;background:var(--clay);color:#fff;
    padding:14px 22px;border-radius:4px;text-decoration:none;font-size:13.5px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.04em;box-shadow:0 10px 26px rgba(168,64,44,0.35);
  }

  /* ===== SPONSORS ===== */
  .sponsor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(min-width:700px){.sponsor-grid{grid-template-columns:repeat(4,1fr);}}
  .sponsor-tile{
    background:rgba(244,239,226,0.05);border:1px dashed rgba(207,154,60,0.35);border-radius:6px;
    padding:26px 16px;text-align:center;font-size:12.5px;color:rgba(244,239,226,0.6);min-height:88px;
    display:flex;align-items:center;justify-content:center;
  }

  /* ===== FOOTER ===== */
  footer{background:#120d09;padding:64px 0 28px;border-top:1px solid rgba(207,154,60,0.18);}
  .foot-grid{display:grid;grid-template-columns:1fr;gap:36px;margin-bottom:46px;}
  @media(min-width:800px){.foot-grid{grid-template-columns:1.3fr 1fr 1fr;}}
  .foot-brand{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .foot-brand img{height:52px;width:52px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;}
  .foot-col h4{font-size:11.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold-2);margin:0 0 16px;}
  .foot-col p, .foot-col a{font-size:13.5px;color:rgba(244,239,226,0.65);line-height:1.9;text-decoration:none;display:block;}
  .foot-bottom{
    display:flex;flex-direction:column;gap:18px;align-items:flex-start;padding-top:26px;
    border-top:1px solid rgba(207,154,60,0.12);
  }
  @media(min-width:760px){.foot-bottom{flex-direction:row;justify-content:space-between;align-items:center;}}
  .foot-sig .name{font-family:'Great Vibes',cursive;font-size:26px;color:var(--gold-2);}
  .foot-copy{font-size:11.5px;color:rgba(244,239,226,0.4);}

  ::selection{background:var(--gold);color:var(--ink);}
  :focus-visible{outline:2px solid var(--gold-2);outline-offset:3px;}

  /* ===== OUR STORY (timeline) ===== */
  .timeline{position:relative;padding-left:28px;border-left:2px solid rgba(207,154,60,0.3);}
  .tl-item{position:relative;padding-bottom:36px;}
  .tl-item:last-child{padding-bottom:0;}
  .tl-item::before{
    content:"";position:absolute;left:-34px;top:2px;width:12px;height:12px;border-radius:50%;
    background:var(--gold);box-shadow:0 0 0 4px rgba(207,154,60,0.18);
  }
  .tl-item .tl-year{font-family:'Space Mono',monospace;font-size:12px;color:var(--gold-2);letter-spacing:0.06em;}
  .tl-item h4{margin:4px 0 6px;font-size:17px;font-family:'Fraunces',serif;color:var(--paper);}
  html[data-lang="hi"] .tl-item h4{font-family:'Noto Serif Devanagari',serif;}
  .tl-item p{margin:0;font-size:14px;color:rgba(244,239,226,0.72);line-height:1.6;max-width:560px;}

  /* ===== FORMAT FACTS ===== */
  .format-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(min-width:760px){.format-grid{grid-template-columns:repeat(4,1fr);}}
  .format-card{
    background:#fff;border-radius:6px;padding:26px 20px;box-shadow:0 10px 26px rgba(27,20,15,0.1);
    border-top:3px solid var(--clay);
  }
  .format-card .ficon{font-size:24px;margin-bottom:10px;}
  .format-card .flabel{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--clay);font-weight:700;margin-bottom:4px;}
  .format-card .fval{font-family:'Fraunces',serif;font-weight:700;font-size:17px;color:var(--ink);}
  html[data-lang="hi"] .format-card .fval{font-family:'Noto Serif Devanagari',serif;}

  /* ===== HIGHLIGHTS ===== */
  .highlight-box{
    display:grid;grid-template-columns:1fr;gap:26px;align-items:center;
    background:linear-gradient(135deg,rgba(207,154,60,0.08),rgba(60,74,48,0.12));
    border:1px solid rgba(207,154,60,0.25);border-radius:10px;padding:36px;
  }
  @media(min-width:760px){.highlight-box{grid-template-columns:1fr 1fr;}}
  .yt-frame{
    position:relative;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#0a0a0a;
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(207,154,60,0.3);
  }
  .yt-frame .playbtn{
    width:64px;height:64px;border-radius:50%;background:var(--clay);display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:22px;box-shadow:0 10px 30px rgba(168,64,44,0.5);
  }
  .yt-frame::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.4));}

  /* ===== COMMITTEE ===== */
  .committee-grid{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:700px){.committee-grid{grid-template-columns:repeat(3,1fr);}}
  .committee-card{
    background:rgba(244,239,226,0.05);border:1px solid rgba(207,154,60,0.2);border-radius:8px;
    padding:24px;text-align:center;
  }
  .committee-card .cavatar{
    width:60px;height:60px;border-radius:50%;margin:0 auto 14px;
    background:linear-gradient(135deg,var(--gold),var(--clay));display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:700;font-size:20px;color:#fff;
  }
  .committee-card h4{margin:0 0 4px;font-size:15.5px;color:var(--paper);font-family:'Fraunces',serif;}
  html[data-lang="hi"] .committee-card h4{font-family:'Noto Serif Devanagari',serif;}
  .committee-card .crole{font-size:11.5px;color:var(--gold-2);text-transform:uppercase;letter-spacing:0.06em;}

  /* ===== REGISTER CTA ===== */
  .register-banner{
    background:linear-gradient(120deg,var(--clay),var(--clay-2));border-radius:12px;padding:48px 36px;
    text-align:center;position:relative;overflow:hidden;
  }
  .register-banner::before{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 24px);
  }
  .register-banner h2{position:relative;color:#fff;margin:0 0 12px;font-size:clamp(24px,4vw,36px);}
  .register-banner p{position:relative;color:rgba(255,255,255,0.85);max-width:520px;margin:0 auto 26px;font-size:15px;}
  .register-ctas{position:relative;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .btn-white{background:#fff;color:var(--clay-2);}
  .btn-outline-white{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.6);}

  /* ===== FAQ ===== */
  .faq-item{border-bottom:1px solid rgba(207,154,60,0.18);}
  .faq-q{
    display:flex;justify-content:space-between;align-items:center;padding:20px 4px;cursor:pointer;
    font-size:15.5px;font-weight:600;color:var(--paper);gap:16px;
  }
  .faq-q .plus{font-family:'Space Mono',monospace;font-size:20px;color:var(--gold-2);transition:transform 0.3s ease;flex-shrink:0;}
  .faq-item.open .plus{transform:rotate(45deg);}
  .faq-a{max-height:0;overflow:hidden;transition:max-height 0.35s ease;}
  .faq-item.open .faq-a{max-height:220px;}
  .faq-a p{padding:0 4px 20px;margin:0;color:rgba(244,239,226,0.7);font-size:14px;line-height:1.65;max-width:640px;}

  /* ===== COMMITTEE MEMBERS ROSTER (empty slots) ===== */
  .roster-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(min-width:640px){.roster-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:900px){.roster-grid{grid-template-columns:repeat(4,1fr);}}
  .roster-card{
    background:rgba(244,239,226,0.04);border:1px solid rgba(207,154,60,0.18);border-radius:8px;
    padding:20px 16px;text-align:center;
  }
  .roster-photo{
    width:76px;height:76px;border-radius:50%;margin:0 auto 12px;overflow:hidden;
    border:2px solid rgba(207,154,60,0.4);background:rgba(207,154,60,0.08);
    display:flex;align-items:center;justify-content:center;
  }
  .roster-photo img{width:100%;height:100%;object-fit:cover;}
  .roster-name{font-family:'Fraunces',serif;font-weight:700;font-size:14.5px;color:var(--paper);}
  html[data-lang="hi"] .roster-name{font-family:'Noto Serif Devanagari',serif;}
  .roster-role{font-size:11px;color:var(--gold-2);text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}
  .roster-sub{font-size:11px;color:rgba(244,239,226,0.55);margin-top:6px;line-height:1.4;}
  .roster-link{display:inline-block;margin-top:8px;font-size:11px;color:var(--gold-2);text-decoration:underline;}
  .roster-card.empty{border-style:dashed;}
  .roster-card.empty .roster-photo{color:rgba(244,239,226,0.35);font-size:26px;}
  .roster-card.empty .roster-name{color:rgba(244,239,226,0.4);font-weight:600;}
  .roster-card.empty .roster-role{color:rgba(244,239,226,0.3);}
</style>
</head>
